name: Public Repository Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "41 5 * * 1"

permissions:
  contents: read

jobs:
  public-security:
    uses: QuantJourneyOrg/.github/.github/workflows/public-python-security.yml@main
    with:
      python-version: "3.11"
      install-command: python -m pip install -e '.[dev]'
      test-command: pytest -q
